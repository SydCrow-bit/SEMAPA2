<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Login - SEMAPA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-color: #f8f9fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: var(--bg-color);
        }

        .login-card { 
            background: white; 
            padding: 2.5rem 1.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 90%; /* Ancho adaptable */
            max-width: 380px; 
            text-align: center;
        }

        .logo-area {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        h2 { 
            color: #333; 
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        p.subtitle {
            color: #777;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        /* Inputs optimizados para dedos (Touch Friendly) */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 0; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* Evita zoom automático en iPhone */
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        /* Botón grande para pulgares */
        button { 
            width: 100%; 
            padding: 16px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .error { 
            background-color: #ffebee;
            color: #c62828; 
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em; 
            margin-top: 15px;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 350px) {
            .login-card { padding: 1.5rem 1rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-droplet"></i>
        </div>
        <h2>Bienvenido</h2>
        <p class="subtitle">Sistema de Gestión de Lecturas IoT</p>
        
        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Usuario" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>

        {% if error %} 
            <div class="error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div> 
        {% endif %}
    </div>
</body>
</html>
